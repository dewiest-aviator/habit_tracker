name: Nightly Release

on:
  schedule:
    - cron: '0 2 * * *'  # 02:00 UTC
  workflow_dispatch:
    inputs:
      manual_release:
        description: "Force release & Play upload"
        required: false
        default: "false"

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

jobs:
  skip-check:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.compare.outputs.should_skip }}
    steps:
      - name: Get current SHA
        id: current
        uses: actions/github-script@v8
        with:
          script: core.setOutput('sha', context.sha)
      - name: Last successful nightly
        id: last
        uses: actions/github-script@v8
        with:
          script: |
            // Use the workflow file path (accepted by the API) instead of the display name
            const workflow_id = 'nightly_release.yml'
            try {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id,
                event: 'schedule',
                per_page: 10
              })
              const lastSuccess = data.workflow_runs.find(run => run.conclusion === 'success')
              core.setOutput('sha', lastSuccess?.head_sha || '')
            } catch (e) {
              core.warning(`Failed to look up prior runs for ${workflow_id}: ${e.message}`)
              core.setOutput('sha', '')
            }
      - name: Compare SHAs
        id: compare
        uses: actions/github-script@v8
        with:
          script: |
            const isSchedule = context.eventName === 'schedule'
            if (!isSchedule) {
              core.info('Manual dispatch detected; skipping skip-check gate.')
              core.setOutput('should_skip', 'false')
              return
            }
            const current = '${{ steps.current.outputs.sha }}'
            const last = '${{ steps.last.outputs.sha }}'
            if (last && current === last) {
              core.notice(`No new commits since last nightly: ${current}`)
              core.setOutput('should_skip', 'true')
            } else {
              core.info(`Nightly will run. current=${current} last=${last}`)
              core.setOutput('should_skip', 'false')
            }

  analyze-test:
    if: needs.skip-check.outputs.should_skip != 'true'
    needs: skip-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Read Flutter version from FVM
        id: fvm
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = '.fvmrc';
            const content = fs.readFileSync(path, 'utf8');
            let v = '';
            try { const json = JSON.parse(content); v = json.flutter || json.flutterSdkVersion || ''; } catch (e) {}
            if (!v) core.setFailed('Flutter version missing in .fvmrc (expected { "flutter": "x.y.z" })');
            core.setOutput('version', v);
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm.outputs.version }}
          cache: true
      - name: Cache Flutter build dirs (.dart_tool, build)
        uses: actions/cache@v4
        with:
          path: |
            .dart_tool
            build
          key: ${{ runner.os }}-flutter-build-${{ steps.fvm.outputs.version }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-build-${{ steps.fvm.outputs.version }}-
            ${{ runner.os }}-flutter-build-
      - name: Get dependencies
        run: flutter pub get
      - name: Run analyzer
        run: flutter analyze
      - name: Run tests with coverage
        run: flutter test --coverage --reporter expanded
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with: { name: coverage-lcov-nightly, path: coverage/lcov.info }
      - name: Upload coverage to Codecov (nightly)
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          fail_ci_if_error: false
          verbose: true

  android-release:
    if: needs.skip-check.outputs.should_skip != 'true'
    needs: analyze-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Read Flutter version from FVM
        id: fvm
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = '.fvmrc';
            const content = fs.readFileSync(path, 'utf8');
            let v = '';
            try { const json = JSON.parse(content); v = json.flutter || json.flutterSdkVersion || ''; } catch (e) {}
            if (!v) core.setFailed('Flutter version missing in .fvmrc (expected { "flutter": "x.y.z" })');
            core.setOutput('version', v);
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm.outputs.version }}
          cache: true
      - name: Cache Gradle (caches & wrapper)
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Cache Flutter build dirs (.dart_tool, build)
        uses: actions/cache@v4
        with:
          path: |
            .dart_tool
            build
          key: ${{ runner.os }}-flutter-build-${{ steps.fvm.outputs.version }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-build-${{ steps.fvm.outputs.version }}-
            ${{ runner.os }}-flutter-build-
      - name: Derive version/build numbers (nightly)
        shell: bash
        run: |
          echo "APP_VERSION_NAME=${{ vars.APP_VERSION_NAME }}" >> $GITHUB_ENV
          echo "APP_BUILD_NUMBER=${{ github.run_number }}" >> $GITHUB_ENV
      - name: Prepare signing keystore
        run: |
          echo "${{ secrets.ANDROID_RELEASE_KEYSTORE_B64 }}" | base64 --decode > android/app/release.keystore
          echo "ANDROID_RELEASE_STORE_FILE=$GITHUB_WORKSPACE/android/app/release.keystore" >> $GITHUB_ENV
          echo "ANDROID_RELEASE_STORE_PASSWORD=${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}" >> $GITHUB_ENV
          echo "ANDROID_RELEASE_KEY_ALIAS=${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}" >> $GITHUB_ENV
          echo "ANDROID_RELEASE_KEY_PASSWORD=${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}" >> $GITHUB_ENV
      - name: Get dependencies
        run: flutter pub get
      - name: Build Android App Bundle (signed)
        run: |
          flutter build appbundle --release \
            --build-name "$APP_VERSION_NAME" \
            --build-number "$APP_BUILD_NUMBER"

      - name: Build Android APK (signed)
        run: |
          flutter build apk --release \
            --build-name "$APP_VERSION_NAME" \
            --build-number "$APP_BUILD_NUMBER"

      - name: Prepare and rename release artifacts
        run: |
          BUILD_TYPE=${{ github.event_name == 'schedule' && 'nightly' || 'manual' }}
          DATE=$(date +%Y%m%d)
          echo "BUILD_TYPE=$BUILD_TYPE" >> $GITHUB_ENV
          echo "DATE=$DATE" >> $GITHUB_ENV

          APK_SRC="build/app/outputs/flutter-apk/app-release.apk"
          AAB_SRC=$(ls build/app/outputs/bundle/release/*.aab | head -n1)

          APK_OUT="habittracker-android-release-${BUILD_TYPE}-${DATE}-v${APP_VERSION_NAME}.${APP_BUILD_NUMBER}.apk"
          AAB_OUT="habittracker-android-release-${BUILD_TYPE}-${DATE}-v${APP_VERSION_NAME}.${APP_BUILD_NUMBER}.aab"

          cp "$APK_SRC" "$APK_OUT"
          cp "$AAB_SRC" "$AAB_OUT"

          echo "APK_OUT=$APK_OUT" >> $GITHUB_ENV
          echo "AAB_OUT=$AAB_OUT" >> $GITHUB_ENV

      - name: Upload Android AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.AAB_OUT }}
          path: ${{ env.AAB_OUT }}

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_OUT }}
          path: ${{ env.APK_OUT }}

      - name: Create GitHub Release and upload assets
        if: github.event_name == 'schedule' || github.event.inputs.manual_release == 'true'
        uses: softprops/action-gh-release@v2
        id: gh_release
        with:
          tag_name: v${{ env.APP_VERSION_NAME }}.${{ env.APP_BUILD_NUMBER }}
          name: Nightly v${{ env.APP_VERSION_NAME }}.${{ env.APP_BUILD_NUMBER }}
          draft: false
          prerelease: false
          generate_release_notes: true
          target_commitish: ${{ github.sha }}
          files: |
            ${{ env.APK_OUT }}
            ${{ env.AAB_OUT }}

      - name: Write Play What's New with GitHub Release link
        if: github.event_name == 'schedule' || github.event.inputs.manual_release == 'true'
        run: |
          URL="${{ steps.gh_release.outputs.url }}"
          mkdir -p whatsnew
          echo "$URL" > whatsnew/whatsnew-en-US

      - name: Authenticate to Google Cloud (WIF)
        if: github.event_name == 'schedule' || github.event.inputs.manual_release == 'true'
        uses: google-github-actions/auth@v2
        id: auth
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}
          create_credentials_file: true

      - name: Upload to Google Play (internal)
        if: github.event_name == 'schedule' || github.event.inputs.manual_release == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: ${{ steps.auth.outputs.credentials_file_path }}
          packageName: com.raijinryu.habittracker
          releaseFiles: ${{ env.AAB_OUT }}
          track: internal
          status: completed
          whatsNewDirectory: whatsnew
          releaseName: v${{ env.APP_VERSION_NAME }}.${{ env.APP_BUILD_NUMBER }}