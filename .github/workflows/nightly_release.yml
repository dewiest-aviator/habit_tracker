name: Nightly Release

on:
  schedule:
    - cron: '0 2 * * *'  # 02:00 UTC
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to build (dev | staging | production)"
        required: false
        default: "staging"
        type: choice
        options:
          - dev
          - staging
          - production

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

jobs:
  set-env:
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.compute.outputs.env_name }}
    steps:
      - name: Compute environment
        id: compute
        uses: actions/github-script@v8
        with:
          script: |
            const isDispatch = context.eventName === 'workflow_dispatch';
            const inputEnv = isDispatch ? (context.payload?.inputs?.environment || 'staging') : 'staging';
            core.info(`Selected environment: ${inputEnv}`);
            core.setOutput('env_name', inputEnv);

  skip-check:
    runs-on: ubuntu-latest
    needs: set-env
    outputs:
      should_skip: ${{ steps.compare.outputs.should_skip }}
    steps:
      - name: Get current SHA
        if: github.event_name == 'schedule'
        id: current
        uses: actions/github-script@v8
        with:
          script: core.setOutput('sha', context.sha)
      - name: Last successful nightly
        if: github.event_name == 'schedule'
        id: last
        uses: actions/github-script@v8
        with:
          script: |
            // Use the workflow file path (accepted by the API) instead of the display name
            const workflow_id = 'nightly_release.yml'
            try {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id,
                event: 'schedule',
                per_page: 10
              })
              const lastSuccess = data.workflow_runs.find(run => run.conclusion === 'success')
              core.setOutput('sha', lastSuccess?.head_sha || '')
            } catch (e) {
              core.warning(`Failed to look up prior runs for ${workflow_id}: ${e.message}`)
              core.setOutput('sha', '')
            }
      - name: Compare SHAs
        if: github.event_name == 'schedule'
        id: compare
        uses: actions/github-script@v8
        with:
          script: |
            const current = '${{ steps.current.outputs.sha }}'
            const last = '${{ steps.last.outputs.sha }}'
            if (last && current === last) {
              core.notice(`No new commits since last nightly: ${current}`)
              core.setOutput('should_skip', 'true')
            } else {
              core.info(`Nightly will run. current=${current} last=${last}`)
              core.setOutput('should_skip', 'false')
            }

  analyze-test:
    if: needs.skip-check.outputs.should_skip != 'true'
    needs: [set-env, skip-check]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Read Flutter version from FVM
        id: fvm
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = '.fvmrc';
            const content = fs.readFileSync(path, 'utf8');
            let v = '';
            try { const json = JSON.parse(content); v = json.flutter || json.flutterSdkVersion || ''; } catch (e) {}
            if (!v) core.setFailed('Flutter version missing in .fvmrc (expected { "flutter": "x.y.z" })');
            core.setOutput('version', v);
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm.outputs.version }}
          cache: true
      - name: Cache Flutter build dirs (.dart_tool, build)
        uses: actions/cache@v4
        with:
          path: |
            .dart_tool
            build
          key: ${{ runner.os }}-flutter-build-${{ steps.fvm.outputs.version }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-build-${{ steps.fvm.outputs.version }}-
            ${{ runner.os }}-flutter-build-
      - name: Get dependencies
        run: flutter pub get
      - name: Run analyzer
        run: flutter analyze
      - name: Run tests with coverage
        run: flutter test --coverage --reporter expanded
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with: { name: coverage-lcov-nightly, path: coverage/lcov.info }
      - name: Upload coverage to Codecov (nightly)
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          fail_ci_if_error: false
          verbose: true

  android-release:
    if: needs.skip-check.outputs.should_skip != 'true'
    needs: [set-env, analyze-test]
    runs-on: ubuntu-latest
    environment: ${{ needs.set-env.outputs.env_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Read Flutter version from FVM
        id: fvm
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = '.fvmrc';
            const content = fs.readFileSync(path, 'utf8');
            let v = '';
            try { const json = JSON.parse(content); v = json.flutter || json.flutterSdkVersion || ''; } catch (e) {}
            if (!v) core.setFailed('Flutter version missing in .fvmrc (expected { "flutter": "x.y.z" })');
            core.setOutput('version', v);
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm.outputs.version }}
          cache: true
      - name: Cache Gradle (caches & wrapper)
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Cache Flutter build dirs (.dart_tool, build)
        uses: actions/cache@v4
        with:
          path: |
            .dart_tool
            build
          key: ${{ runner.os }}-flutter-build-${{ steps.fvm.outputs.version }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-build-${{ steps.fvm.outputs.version }}-
            ${{ runner.os }}-flutter-build-
      - name: Derive version/build numbers (nightly)
        shell: bash
        run: |
          echo "APP_VERSION_NAME=${{ vars.APP_VERSION_NAME }}" >> $GITHUB_ENV
          echo "APP_BUILD_NUMBER=${{ github.run_number }}" >> $GITHUB_ENV
      - name: Restore signing keystore (shared PKCS12)
        shell: bash
        run: |
          mkdir -p $HOME/.android
          echo "$ANDROID_KEYSTORE_B64" | base64 --decode > "$ANDROID_STORE_FILE_PATH"
          {
            echo "ANDROID_STORE_FILE=$ANDROID_STORE_FILE_PATH"
            echo "ANDROID_STORE_PASSWORD=$ANDROID_STORE_PASSWORD"
            echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS"
            echo "ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD"
          } >> $GITHUB_ENV

      - name: Restore Firebase configs (generic paths)
        shell: bash
        env:
          ANDROID_GOOGLE_SERVICES_PATH: ${{ vars.ANDROID_GOOGLE_SERVICES_PATH }}
          IOS_GOOGLE_SERVICE_INFO_PLIST_PATH: ${{ vars.IOS_GOOGLE_SERVICE_INFO_PLIST_PATH }}
          FLAVOR: ${{ vars.FLAVOR }}
        run: |
          # Ensure dirs exist
          mkdir -p "$(dirname "$ANDROID_GOOGLE_SERVICES_PATH")"

          # Write files from env-scoped secrets
          printf '%s' "$ANDROID_GOOGLE_SERVICES_JSON"  > "$ANDROID_GOOGLE_SERVICES_PATH"

          # Export flavor for later steps (default to staging if not set)
          FLAVOR="${FLAVOR:-staging}"
          echo "FLAVOR=$FLAVOR" >> $GITHUB_ENV
          echo "FLAVOR_CAP=${FLAVOR^}" >> $GITHUB_ENV

      - name: Build Android APK (${{ env.FLAVOR }} release)
        run: |
          flutter build apk --release \
            --flavor "$FLAVOR" \
            --build-name "$APP_VERSION_NAME" \
            --build-number "$APP_BUILD_NUMBER"
      - name: Upload Crashlytics mapping (${{ env.FLAVOR_CAP }}Release)
        run: |
          cd android
          ./gradlew app:uploadCrashlyticsMappingFile${FLAVOR_CAP}Release
      - name: Prepare and rename release artifact (APK only)
        run: |
          BUILD_TYPE=${{ github.event_name == 'schedule' && 'nightly' || 'manual' }}
          DATE=$(date +%Y%m%d)
          echo "BUILD_TYPE=$BUILD_TYPE" >> $GITHUB_ENV
          echo "DATE=$DATE" >> $GITHUB_ENV

          APK_SRC="build/app/outputs/flutter-apk/app-${FLAVOR}-release.apk"
          APK_OUT="habittracker-android-${FLAVOR}-${BUILD_TYPE}-${DATE}-v${APP_VERSION_NAME}.${APP_BUILD_NUMBER}.apk"

          cp "$APK_SRC" "$APK_OUT"
          echo "APK_OUT=$APK_OUT" >> $GITHUB_ENV

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_OUT }}
          path: ${{ env.APK_OUT }}
          
      - name: Derive Firebase appId from google-services.json
        id: appid
        uses: actions/github-script@v8
        env:
          ANDROID_GOOGLE_SERVICES_PATH: ${{ vars.ANDROID_GOOGLE_SERVICES_PATH }}
        with:
          script: |
            const fs = require('fs');
            const path = process.env.ANDROID_GOOGLE_SERVICES_PATH;
            try {
              const raw = fs.readFileSync(path, 'utf8');
              const j = JSON.parse(raw);
              const appId = j?.client?.[0]?.client_info?.mobilesdk_app_id;
              if (!appId) {
                core.setFailed(`mobilesdk_app_id not found in ${path}`);
              } else {
                core.info(`Detected Firebase appId: ${appId}`);
                core.exportVariable('FIREBASE_APP_ID', appId);
              }
            } catch (e) {
              core.setFailed(`Failed to read ${path}: ${e.message}`);
            }

      - name: Authenticate to Google Cloud for Firebase (WIF)
        uses: google-github-actions/auth@v2
        id: fb_auth
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}
          create_credentials_file: true

      - name: Upload APK to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ env.FIREBASE_APP_ID }}
          serviceCredentialsFile: ${{ steps.fb_auth.outputs.credentials_file_path }}
          groups: ${{ vars.FIREBASE_TESTERS_GROUP || 'internal' }}
          file: ${{ env.APK_OUT }}
          releaseNotes: "${{ env.FLAVOR_CAP }} ${{ github.event_name == 'schedule' && 'Nightly' || 'Manual' }} v${{ env.APP_VERSION_NAME }}.${{ env.APP_BUILD_NUMBER }} on ${{ env.DATE }}"