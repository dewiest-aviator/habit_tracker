name: PR CI

on:
  pull_request:
    branches: [ "main" ]

concurrency:
  group: pr-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      flutter: ${{ steps.filter.outputs.flutter }}
      android: ${{ steps.filter.outputs.android }}
      ios: ${{ steps.filter.outputs.ios }}
      workflow: ${{ steps.filter.outputs.workflow }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Paths filter
        id: filter
        uses: dorny/paths-filter@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: |
            flutter:
              - 'lib/**'
              - 'test/**'
              - 'pubspec.yaml'
              - 'pubspec.lock'
              - 'analysis_options.yaml'
            android:
              - 'android/**'
            ios:
              - 'ios/**'
            workflow:
              - '.github/workflows/pr_ci.yml'

  codecov-ping:
    name: Codecov Ping (no coverage)
    needs: changes
    if: ${{ needs.changes.outputs.flutter != 'true' && needs.changes.outputs.workflow != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Codecov empty-upload (no reports needed)
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          run_command: empty-upload

  analyze-test:
    name: Analyze & Test
    needs: changes
    if: ${{ needs.changes.outputs.flutter == 'true' || needs.changes.outputs.workflow == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Read Flutter version (.fvmrc)
        id: fvm
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = '.fvmrc';
            const content = fs.readFileSync(path, 'utf8');
            let v = '';
            try { const json = JSON.parse(content); v = json.flutter || json.flutterSdkVersion || ''; } catch (e) {}
            if (!v) core.setFailed('Flutter version missing in .fvmrc (expected { "flutter": "x.y.z" })');
            core.setOutput('version', v);

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm.outputs.version }}
          cache: true

      - name: Cache Flutter build artifacts
        uses: actions/cache@v4
        with:
          path: |
            .dart_tool
            build
          key: ${{ runner.os }}-flutter-${{ steps.fvm.outputs.version }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-${{ steps.fvm.outputs.version }}-
            ${{ runner.os }}-flutter-

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze

      - name: Flutter tests with coverage
        run: flutter test --coverage --reporter expanded

      - name: Upload lcov.info
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          fail_ci_if_error: false
          verbose: true

  android-debug:
    name: Android Debug Build
    needs: [changes, analyze-test]
    if: ${{ needs.changes.outputs.flutter == 'true' || needs.changes.outputs.android == 'true' || needs.changes.outputs.workflow == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Provision google-services.json (if present)
        shell: bash
        run: |
          mkdir -p android/app
          echo "${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_B64 }}" | base64 --decode > android/app/google-services.json
          test -s android/app/google-services.json && echo "google-services.json written"

      - name: Read Flutter version (.fvmrc)
        id: fvm
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = '.fvmrc';
            const content = fs.readFileSync(path, 'utf8');
            let v = '';
            try { const json = JSON.parse(content); v = json.flutter || json.flutterSdkVersion || ''; } catch (e) {}
            if (!v) core.setFailed('Flutter version missing in .fvmrc (expected { "flutter": "x.y.z" })');
            core.setOutput('version', v);

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm.outputs.version }}
          cache: true

      - name: Cache Flutter build artifacts
        uses: actions/cache@v4
        with:
          path: |
            .dart_tool
            build
          key: ${{ runner.os }}-flutter-${{ steps.fvm.outputs.version }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-${{ steps.fvm.outputs.version }}-
            ${{ runner.os }}-flutter-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Flutter pub get
        run: flutter pub get

      - name: Derive version/PR/build numbers
        run: |
          echo "APP_VERSION_NAME=${{ vars.APP_VERSION_NAME }}-pr${{ github.event.pull_request.number }}" >> $GITHUB_ENV
          echo "APP_BUILD_NUMBER=${{ github.run_number }}" >> $GITHUB_ENV

      - name: Build debug APK with version
        run: |
          flutter build apk --debug \
            --build-name "$APP_VERSION_NAME" \
            --build-number "$APP_BUILD_NUMBER" \
            --dart-define=FIREBASE_ENABLED=true

      - name: Rename APK artifact
        run: |

          SRC="build/app/outputs/flutter-apk/app-debug.apk"
          OUT="habittracker-android-debug-v${APP_VERSION_NAME}.${APP_BUILD_NUMBER}.apk"
          cp "$SRC" "$OUT"
          echo "APK_OUT=$OUT" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_OUT }}
          path: ${{ env.APK_OUT }}

  ios-debug:
    name: iOS Debug Build (Simulator)
    needs: [changes, analyze-test]
    if: ${{ needs.changes.outputs.flutter == 'true' || needs.changes.outputs.ios == 'true' || needs.changes.outputs.workflow == 'true' }}
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Provision GoogleService-Info.plist (if present)
        shell: bash
        run: |
          echo "${{ secrets.IOS_GOOGLESERVICE_INFO_PLIST_B64 }}" | base64 --decode > ios/Runner/GoogleService-Info.plist
          test -s ios/Runner/GoogleService-Info.plist && plutil -lint ios/Runner/GoogleService-Info.plist && echo "GoogleService-Info.plist written"

      - name: Provision firebase_app_id_file.json (if present)
        shell: bash
        run: |
          echo "${{ secrets.IOS_FIREBASE_APP_ID_FILE_B64 }}" | base64 --decode > ios/firebase_app_id_file.json
          test -s ios/firebase_app_id_file.json && echo "firebase_app_id_file.json written"

      - name: Read Flutter version (.fvmrc)
        id: fvm
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = '.fvmrc';
            const content = fs.readFileSync(path, 'utf8');
            let v = '';
            try { const json = JSON.parse(content); v = json.flutter || json.flutterSdkVersion || ''; } catch (e) {}
            if (!v) core.setFailed('Flutter version missing in .fvmrc (expected { "flutter": "x.y.z" })');
            core.setOutput('version', v);

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm.outputs.version }}
          cache: true

      - name: Cache Flutter build artifacts (macOS)
        uses: actions/cache@v4
        with:
          path: |
            .dart_tool
            build
          key: ${{ runner.os }}-flutter-${{ steps.fvm.outputs.version }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-${{ steps.fvm.outputs.version }}-
            ${{ runner.os }}-flutter-

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ~/.cocoapods
            ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install Pods
        run: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Flutter pub get
        run: flutter pub get

      - name: Derive version/PR/build numbers (iOS)
        run: |
          echo "APP_VERSION_NAME=${{ vars.APP_VERSION_NAME }}-pr${{ github.event.pull_request.number }}" >> $GITHUB_ENV
          echo "APP_BUILD_NUMBER=${{ github.run_number }}" >> $GITHUB_ENV

      - name: Derive iOS display name
        run: |
          echo "IOS_APP_DISPLAY_NAME=${APP_VERSION_NAME}" >> $GITHUB_ENV

      - name: Build iOS simulator app (debug)
        run: flutter build ios --debug --no-codesign --simulator --dart-define=FIREBASE_ENABLED=true

      - name: Inject display name into Info.plist
        run: |
          APP_PATH="build/ios/iphonesimulator/Runner.app"
          PLIST="$APP_PATH/Info.plist"
          set -e
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName $IOS_APP_DISPLAY_NAME" "$PLIST" || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string $IOS_APP_DISPLAY_NAME" "$PLIST"

      - name: Zip simulator app with version
        run: |
          APP_PATH="build/ios/iphonesimulator/Runner.app"
          OUT_NAME="habittracker-ios-sim-debug-v${APP_VERSION_NAME}.${APP_BUILD_NUMBER}.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$OUT_NAME"
          echo "APP_OUT=$OUT_NAME" >> $GITHUB_ENV

      - name: Upload iOS simulator app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_OUT }}
          path: ${{ env.APP_OUT }}