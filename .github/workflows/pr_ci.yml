name: PR CI

on:
  pull_request:
    branches: [ "main" ]

concurrency:
  group: pr-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      flutter: ${{ steps.filter.outputs.flutter }}
      android: ${{ steps.filter.outputs.android }}
      ios: ${{ steps.filter.outputs.ios }}
      workflow: ${{ steps.filter.outputs.workflow }}
    steps:
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: |
            flutter:
              - 'lib/**'
              - 'test/**'
              - 'pubspec.yaml'
              - 'pubspec.lock'
              - 'analysis_options.yaml'
            android:
              - 'android/**'
            ios:
              - 'ios/**'
            workflow:
              - '.github/workflows/pr_ci.yml'

  codecov-ping:
    name: Codecov Ping (no coverage)
    needs: changes
    if: ${{ needs.changes.outputs.flutter != 'true' && needs.changes.outputs.workflow != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Ping Codecov to create status (no reports)
        uses: codecov/codecov-action@v5
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          disable_search: true
          files: ""
          flags: noop
          name: noop-ping
          fail_ci_if_error: false
          override_pr: ${{ github.event.pull_request.number }}
          override_commit: ${{ github.sha }}
          override_branch: ${{ github.head_ref }}
          verbose: true

  analyze-test:
    name: Analyze & Test
    needs: changes
    if: ${{ needs.changes.outputs.flutter == 'true' || needs.changes.outputs.workflow == 'true' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with: { channel: stable, cache: true }
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test --coverage --reporter expanded
      - uses: actions/upload-artifact@v4
        with: { name: coverage-lcov, path: coverage/lcov.info }
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          fail_ci_if_error: false
          verbose: true

  android-debug:
    name: Android Debug Build
    needs: [changes, analyze-test]
    if: ${{ needs.changes.outputs.flutter == 'true' || needs.changes.outputs.android == 'true' || needs.changes.outputs.workflow == 'true' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with: { channel: stable, cache: true }
      - run: flutter pub get
      - name: Derive version/PR/build numbers
        run: |
          echo "APP_VERSION_NAME=${{ vars.APP_VERSION_NAME }}-pr${{ github.event.pull_request.number }}" >> $GITHUB_ENV
          echo "APP_BUILD_NUMBER=${{ github.run_number }}" >> $GITHUB_ENV
      - name: Build debug APK with secrets version
        run: |
          flutter build apk --debug \
            --build-name "$APP_VERSION_NAME" \
            --build-number "$APP_BUILD_NUMBER"
      - name: Rename APK artifact
        run: |
          SRC="build/app/outputs/flutter-apk/app-debug.apk"
          OUT="habittracker-android-debug-v${APP_VERSION_NAME}-build${APP_BUILD_NUMBER}.apk"
          cp "$SRC" "$OUT"
      - uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk-v${{ env.APP_VERSION_NAME }}-build${{ env.APP_BUILD_NUMBER }}
          path: habittracker-android-debug-v${{ env.APP_VERSION_NAME }}-build${{ env.APP_BUILD_NUMBER }}.apk

  ios-debug:
    name: iOS Debug Build (Simulator)
    needs: [changes, analyze-test]
    if: ${{ needs.changes.outputs.flutter == 'true' || needs.changes.outputs.ios == 'true' || needs.changes.outputs.workflow == 'true' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with: { channel: stable, cache: true }
      - run: flutter pub get
      - name: Derive version/PR/build numbers (iOS)
        run: |
          echo "APP_VERSION_NAME=${{ vars.APP_VERSION_NAME }}-pr${{ github.event.pull_request.number }}" >> $GITHUB_ENV
          echo "APP_BUILD_NUMBER=${{ github.run_number }}" >> $GITHUB_ENV
      - name: Derive iOS display name
        run: |
          echo "IOS_APP_DISPLAY_NAME=${APP_VERSION_NAME}" >> $GITHUB_ENV
      - name: Build iOS simulator app (debug)
        run: flutter build ios --debug --no-codesign --simulator
      - name: Inject display name into Info.plist
        run: |
          APP_PATH="build/ios/iphonesimulator/Runner.app"
          PLIST="$APP_PATH/Info.plist"
          set -e
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName $IOS_APP_DISPLAY_NAME" "$PLIST" || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string $IOS_APP_DISPLAY_NAME" "$PLIST"
      - name: Zip simulator app with version
        run: |
          APP_PATH="build/ios/iphonesimulator/Runner.app"
          OUT_NAME="habittracker-ios-sim-debug-v${APP_VERSION_NAME}-build${APP_BUILD_NUMBER}.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$OUT_NAME"
      - uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-debug-app-v${{ env.APP_VERSION_NAME }}-build${{ env.APP_BUILD_NUMBER }}
          path: habittracker-ios-sim-debug-v${{ env.APP_VERSION_NAME }}-build${{ env.APP_BUILD_NUMBER }}.zip