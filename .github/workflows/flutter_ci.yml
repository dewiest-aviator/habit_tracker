name: Flutter CI

on:
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 2 * * *'  # nightly at 02:00 UTC

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------- PR PIPELINE ----------------
  pr-analyze-test:
    if: github.event_name == 'pull_request'
    name: Analyze & Test (PR)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests with coverage
        run: flutter test --coverage --reporter expanded

      - name: Upload coverage artifact (lcov.info)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: ${{ secrets.CODECOV_TOKEN != '' }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          fail_ci_if_error: false
          verbose: true

  pr-android-debug:
    if: github.event_name == 'pull_request'
    name: Android Debug Build (PR)
    runs-on: macos-latest
    needs: pr-analyze-test
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

  pr-ios-debug:
    if: github.event_name == 'pull_request'
    name: iOS Debug Build (PR, simulator)
    runs-on: macos-latest
    needs: pr-analyze-test
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build ios --debug --no-codesign --simulator
      - name: Zip simulator app
        run: |
          APP_PATH="build/ios/iphonesimulator/Runner.app"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" runner-sim-debug.zip
      - uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-debug-app
          path: runner-sim-debug.zip

  # ---------------- NIGHTLY SKIP CHECK ----------------
  nightly-skip-check:
    if: github.event_name == 'schedule'
    name: Nightly – Skip if no new commits
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.compare.outputs.should_skip }}
      last_sha: ${{ steps.last.outputs.sha }}
    steps:
      - name: Get current SHA
        id: current
        uses: actions/github-script@v7
        with:
          script: |
            core.setOutput('sha', context.sha)

      - name: Find last successful nightly run
        id: last
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflow_id = context.workflow;
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner, repo, workflow_id, event: 'schedule', status: 'success', per_page: 1
            });
            const last = data.workflow_runs[0];
            core.setOutput('sha', last ? last.head_sha : '')

      - name: Compare SHAs
        id: compare
        uses: actions/github-script@v7
        with:
          script: |
            const current = '${{ steps.current.outputs.sha }}';
            const last = '${{ steps.last.outputs.sha }}';
            if (last && current === last) {
              core.notice(`No new commits since last nightly: ${current}`);
              core.setOutput('should_skip', 'true');
            } else {
              core.info(`Nightly will run. current=${current} last=${last}`);
              core.setOutput('should_skip', 'false');
            }

  # ---------------- NIGHTLY PIPELINE ----------------
  nightly-analyze-test:
    if: github.event_name == 'schedule' && needs.nightly-skip-check.outputs.should_skip != 'true'
    name: Analyze & Test (Nightly)
    runs-on: macos-latest
    needs: nightly-skip-check
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test --coverage --reporter expanded
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov-nightly
          path: coverage/lcov.info
      - name: Upload coverage to Codecov (nightly)
        uses: codecov/codecov-action@v5
        if: ${{ secrets.CODECOV_TOKEN != '' }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          fail_ci_if_error: false
          verbose: true

  nightly-android-release:
    if: github.event_name == 'schedule' && needs.nightly-skip-check.outputs.should_skip != 'true'
    name: Android Release Build (Nightly)
    runs-on: macos-latest
    needs: nightly-analyze-test
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Prepare signing keystore
        run: |
          echo "${{ secrets.ANDROID_RELEASE_KEYSTORE_B64 }}" | base64 --decode > android/app/release.keystore

      - name: Export signing env for Gradle
        run: |
          echo "STORE FILE = android/app/release.keystore"
          echo "::add-mask::${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}"
          echo "::add-mask::${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}"
          echo "::add-mask::${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}"
          echo "Signing env exported"

      - run: flutter pub get
      - run: flutter build appbundle --release
      - uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: build/app/outputs/bundle/release/*.aab
