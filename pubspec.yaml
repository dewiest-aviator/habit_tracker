name: habit_tracker
description: "A new Flutter project."
publish_to: 'none' # Prevent accidental publishing

version: 1.0.0+1

environment:
  sdk: ^3.9.2

# Dependencies
dependencies:
  flutter:
    sdk: flutter
  go_router: ^16.2.4
  cupertino_icons: ^1.0.8
  firebase_core: ^3.8.0
  firebase_analytics: ^11.3.0
  firebase_crashlytics: ^4.1.0
  shared_preferences: ^2.3.2
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.3
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

# Flutter configuration
flutter:
  uses-material-design: true

flutter_launcher_icons:
  ios: true
  image_path_ios: assets/branding/app_icon_ios.png
  remove_alpha_ios: true

flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#041529"
  image: assets/branding/app_icon.png
  image_dark: assets/branding/app_icon.png
